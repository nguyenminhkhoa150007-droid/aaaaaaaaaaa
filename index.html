<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>E-Ra Joystick</title>
    <!-- Thư viện NippleJS tạo Joystick -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Thư viện E-Ra Widget -->
    <script src="https://www.unpkg.com/@eohjsc/era-widget@1.1.6/src/index.js"></script>
    <style>
        body { 
            margin: 0; padding: 0; 
            /* [CẬP NHẬT] Dùng biến môi trường của E-Ra để đồng bộ màu Sáng/Tối trên Mobile App */
            background-color: var(--era-background, #1e1e2f); 
            color: var(--era-text, white); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; overflow: hidden; 
            font-family: sans-serif; user-select: none; touch-action: none; 
        }
        #joystick-zone { 
            width: 100%; height: 60vh; position: relative; 
            /* [CẬP NHẬT] Màu nền khung Joystick đồng bộ với màu thẻ (Card) trên Mobile */
            background-color: var(--era-card, #2a2a40); 
            border-radius: 16px; 
            margin-top: 20px; box-shadow: inset 0 4px 6px rgba(0,0,0,0.3); 
        }
    </style>
</head>
<body>
    <div class="w-full max-w-md px-4 text-center">
        <h2 class="text-xl font-bold text-blue-400">Điều khiển Xe 3 Bánh</h2>
        <div class="flex justify-around mt-4 text-sm text-gray-300 bg-gray-800 p-3 rounded-lg shadow-md">
            <div>Trục X: <span id="valX" class="font-bold text-green-400 text-lg">0</span></div>
            <div>Trục Y: <span id="valY" class="font-bold text-blue-400 text-lg">0</span></div>
        </div>
        <div id="joystick-zone"></div>
    </div>

    <script>
        const eraWidget = new EraWidget();
        let config = null;
        
        const valXEl = document.getElementById('valX');
        const valYEl = document.getElementById('valY');

        // Khởi tạo kết nối với E-Ra
        eraWidget.init({
            onConfiguration: (configuration) => {
                config = configuration;
                console.log('Đã nạp Cấu hình E-Ra:', config);
            },
            onValues: (values) => {}
        });

        // [CẬP NHẬT] Tính toán kích thước Joystick linh hoạt cho màn hình Mobile
        const screenWidth = window.innerWidth;
        const joySize = screenWidth < 400 ? 110 : 140; // Thu nhỏ lại nếu là màn hình điện thoại bé

        // Tạo Joystick
        const manager = nipplejs.create({
            zone: document.getElementById('joystick-zone'),
            mode: 'static',
            position: { left: '50%', top: '50%' },
            color: '#3b82f6',
            size: joySize,
            restOpacity: 0.8
        });

        let lastSendTime = 0;

        // Bắt sự kiện khi kéo Joystick
        manager.on('move', (event, data) => {
            let x = Math.round(data.vector.x * 100);
            let y = Math.round(data.vector.y * 100); 

            valXEl.innerText = x;
            valYEl.innerText = y;

            const now = Date.now();
            if (now - lastSendTime > 100) {
                lastSendTime = now;
                sendDataToEra(x, y);
            }
        });

        // Bắt sự kiện khi thả tay khỏi Joystick
        manager.on('end', () => {
            valXEl.innerText = 0;
            valYEl.innerText = 0;
            sendDataToEra(0, 0);
        });

        // Hàm gửi dữ liệu lên E-Ra
        function sendDataToEra(x, y) {
            if (config && config.actions && config.actions.length > 0) {
                let payload = `${x},${y}`; 
                
                // Cú pháp đúng của SDK: triggerAction(action_id, alias, { value: dữ_liệu })
                eraWidget.triggerAction(config.actions[0].action, 1, { value: payload });
                
                console.log("Đã gửi Data: ", payload);
            } else {
                console.error("LỖI: Chưa cấu hình Action trên E-Ra Dashboard.");
            }
        }
    </script>
</body>
</html>
